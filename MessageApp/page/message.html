<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 560px;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 28px;
        }

        header .logo {
            font-size: 2.4rem;
            margin-bottom: 4px;
        }

        header h1 {
            color: #2e7d32;
            margin: 0;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        header p.subtitle {
            color: #555;
            margin: 6px 0 0;
            font-size: 0.95rem;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            padding: 28px 28px 24px;
            margin-bottom: 20px;
        }

        /* ── Form ── */
        .add-todo-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.88rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input[type="text"],
        .form-group textarea {
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        .form-group textarea {
            min-height: 80px;
        }

        .btn-add {
            padding: 12px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-add:hover {
            background-color: #43a047;
        }

        .btn-add:active {
            transform: scale(0.98);
        }

        /* ── Save to server link ── */
        .server-form-toggle {
            text-align: center;
            font-size: 0.84rem;
            color: #777;
            margin-top: 4px;
        }

        .server-form-toggle a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
        }

        .server-form-toggle a:hover {
            text-decoration: underline;
        }

        /* ── Server save panel ── */
        .server-panel {
            display: none;
            border-top: 1.5px dashed #e0e0e0;
            margin-top: 16px;
            padding-top: 16px;
        }

        .server-panel.open {
            display: block;
        }

        .server-panel p.hint {
            font-size: 0.82rem;
            color: #888;
            margin: 0 0 12px;
        }

        .btn-save-server {
            padding: 10px 18px;
            background-color: #1976d2;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: background-color 0.2s;
        }

        .btn-save-server:hover {
            background-color: #1565c0;
        }

        /* ── Stats bar ── */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.88rem;
            color: #555;
            font-weight: 500;
        }

        .stats-bar span strong {
            color: #2e7d32;
        }

        .btn-clear-all {
            background: none;
            border: none;
            color: #e57373;
            font-size: 0.82rem;
            cursor: pointer;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .btn-clear-all:hover {
            background: #fce4e4;
        }

        /* ── Todo list ── */
        .todo-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 30px 0 20px;
            color: #aaa;
        }

        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.95rem;
        }

        /* ── Todo item ── */
        .todo-item {
            background-color: #f9f9f9;
            padding: 14px 16px;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .todo-item.done {
            border-left-color: #bdbdbd;
            opacity: 0.7;
        }

        .todo-item.done .todo-title {
            text-decoration: line-through;
            color: #aaa;
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-title {
            font-weight: 600;
            color: #222;
            font-size: 0.97rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .todo-note {
            font-size: 0.83rem;
            color: #777;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .todo-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            padding: 6px 7px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .btn-done {
            color: #66bb6a;
        }

        .btn-done:hover {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .btn-delete {
            color: #ef9a9a;
        }

        .btn-delete:hover {
            background: #fce4e4;
            color: #c62828;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 10px;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .container {
                margin-top: 16px;
            }

            .card {
                padding: 20px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">✅</div>
            <h1>Todo App</h1>
            <p class="subtitle">Organise your tasks, one step at a time.</p>
        </header>

        <!-- Add todo card -->
        <div class="card">
            <form class="add-todo-form" id="todoForm" autocomplete="off">
                <div class="form-group">
                    <label for="title">Title <span style="color:#e57373">*</span></label>
                    <input type="text" id="title" name="title" placeholder="e.g. Buy groceries" maxlength="80" required>
                </div>
                <div class="form-group">
                    <label for="noteText">Note <span style="color:#aaa;font-weight:400;">(optional)</span></label>
                    <textarea id="noteText" name="noteText" placeholder="Add extra details…" maxlength="500"></textarea>
                </div>
                <button type="submit" class="btn-add" id="addTodoBtn">
                    <i class="fas fa-plus-circle"></i> Add Todo
                </button>
            </form>

            <!-- Server save panel (optional) -->
            <div class="server-form-toggle">
                Want to <a href="#" id="toggleServerPanel">save a message to the server</a> instead?
            </div>
            <div class="server-panel" id="serverPanel">
                <p class="hint"><i class="fas fa-server"></i> This sends your message to the server and stores it as a file. Title must be unique.</p>
                <form method="POST" action="/create" id="serverForm">
                    <div class="form-group" style="margin-bottom:12px;">
                        <label for="serverTitle">Title</label>
                        <input type="text" id="serverTitle" name="title" placeholder="Unique message title" maxlength="80" required>
                    </div>
                    <div class="form-group" style="margin-bottom:12px;">
                        <label for="serverText">Message</label>
                        <textarea id="serverText" name="text" placeholder="Your message…" maxlength="2000" required></textarea>
                    </div>
                    <button type="submit" class="btn-save-server">
                        <i class="fas fa-save"></i> Save to Server
                    </button>
                </form>
            </div>
        </div>

        <!-- Todo list card -->
        <div class="card">
            <div class="stats-bar">
                <span>Tasks: <strong id="taskCount">0</strong></span>
                <button class="btn-clear-all" id="clearAllBtn" title="Remove all tasks">
                    <i class="fas fa-trash"></i> Clear all
                </button>
            </div>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📋</div>
                <p>No todos yet — add one above!</p>
            </div>

            <ul class="todo-list" id="todoList"></ul>
        </div>

        <footer>Group 6 · Computing Enterprise Module</footer>
    </div>

    <script>
        const todoForm   = document.getElementById('todoForm');
        const todoList   = document.getElementById('todoList');
        const taskCount  = document.getElementById('taskCount');
        const emptyState = document.getElementById('emptyState');
        const clearAllBtn = document.getElementById('clearAllBtn');

        function updateUI() {
            const count = todoList.children.length;
            taskCount.textContent = count;
            emptyState.style.display = count === 0 ? 'block' : 'none';
        }

        function createTodoItem(title, note) {
            const li = document.createElement('li');
            li.classList.add('todo-item');

            li.innerHTML = `
                <div class="todo-content">
                    <div class="todo-title" title='${escapeHtml(title)}'>${escapeHtml(title)}</div>
                    ${note ? `<div class="todo-note">${escapeHtml(note)}</div>` : ''}
                </div>
                <div class="todo-actions">
                    <button class="icon-btn btn-done" title="Mark as done">
                        <i class="fas fa-check"></i>
                    </button>
                    <button class="icon-btn btn-delete" title="Delete">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `;

            li.querySelector('.btn-done').addEventListener('click', function () {
                li.classList.toggle('done');
            });

            li.querySelector('.btn-delete').addEventListener('click', function () {
                li.style.transition = 'opacity 0.2s';
                li.style.opacity = '0';
                setTimeout(() => { li.remove(); updateUI(); }, 200);
            });

            return li;
        }

        function escapeHtml(str) {
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        todoForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const title = document.getElementById('title').value.trim();
            const note  = document.getElementById('noteText').value.trim();

            if (!title) return;

            const li = createTodoItem(title, note);
            todoList.prepend(li);

            document.getElementById('title').value    = '';
            document.getElementById('noteText').value = '';
            document.getElementById('title').focus();

            updateUI();
        });

        clearAllBtn.addEventListener('click', function () {
            if (todoList.children.length === 0) return;
            if (!confirm('Remove all tasks?')) return;
            todoList.innerHTML = '';
            updateUI();
        });

        // Toggle server save panel
        document.getElementById('toggleServerPanel').addEventListener('click', function (e) {
            e.preventDefault();
            const panel = document.getElementById('serverPanel');
            panel.classList.toggle('open');
            this.textContent = panel.classList.contains('open')
                ? 'hide server save'
                : 'save a message to the server';
        });

        updateUI();
    </script>
</body>
</html>
